(function(){
  var hash = location.hash.slice(1);
  if (!hash) return;
  var p = {};
  hash.split('&').forEach(function(pair){
    var eq = pair.indexOf('=');
    if (eq > 0) p[decodeURIComponent(pair.slice(0,eq))] = decodeURIComponent(pair.slice(eq+1));
  });
  if (!p.artist && !p.topic) return;
  setTimeout(function(){
    if (!cards.length) return;
    var c = cards[0];
    if (p.artist) c.tag   = p.artist;
    if (p.topic)  c.title = p.topic;
    if (p.hook)   c.body  = p.hook + (p.reason ? '\n' + p.reason : '');
    renderAll();
  }, 150);
})();

// ── 글로벌 색상 오버라이드 ──
var gBgColor   = null;  // null = 팔레트 기본값 사용
var gTextColor = null;
var gSource    = '';    // 이미지 출처 (카드 하단에 렌더링)

// ── postMessage: 색상 오버라이드 ──
window.addEventListener('message', function(e) {
  if (!e.data || e.data.type !== 'setColors') return;
  if (e.data.bgColor   !== undefined) gBgColor   = e.data.bgColor   || null;
  if (e.data.textColor !== undefined) gTextColor = e.data.textColor || null;
  _pvSig = null; _pvScale = 0;
  renderAll();
});

// ── 색상 컨트롤 이벤트 ──
(function(){
  function applyBg(val) {
    gBgColor = val || null;
    var lbl = document.getElementById('gBgLabel');
    if (lbl) lbl.textContent = val || '팔레트';
    _pvSig = null; _pvScale = 0; renderAll();
  }
  function applyTx(val) {
    gTextColor = val || null;
    var lbl = document.getElementById('gTxLabel');
    if (lbl) lbl.textContent = val || '기본';
    _pvSig = null; _pvScale = 0; renderAll();
  }
  document.addEventListener('DOMContentLoaded', function() {
    var bgIn = document.getElementById('gBgInput');
    var txIn = document.getElementById('gTxInput');
    var bgRst = document.getElementById('gBgReset');
    var txRst = document.getElementById('gTxReset');
    if (bgIn) bgIn.addEventListener('input', function(){ applyBg(this.value); });
    if (txIn) txIn.addEventListener('input', function(){ applyTx(this.value); });
    if (bgRst) bgRst.addEventListener('click', function(){
      gBgColor = null;
      document.getElementById('gBgInput').value = '#11040C';
      document.getElementById('gBgLabel').textContent = '팔레트';
      _pvSig = null; _pvScale = 0; renderAll();
    });
    if (txRst) txRst.addEventListener('click', function(){
      gTextColor = null;
      document.getElementById('gTxInput').value = '#ffffff';
      document.getElementById('gTxLabel').textContent = '기본';
      _pvSig = null; _pvScale = 0; renderAll();
    });
  });
})();

// ── postMessage: RAG 자동 슬라이드 채우기 ──
window.addEventListener('message', function(e) {
  if (!e.data || e.data.type !== 'fillSlides') return;
  var slides = e.data.slides;
  var thumbnail = e.data.thumbnail || null;
  if (!Array.isArray(slides) || !slides.length) return;
  if (e.data.source !== undefined) gSource = e.data.source || '';

  // 기존 카드를 슬라이드 수에 맞게 조정
  while (cards.length < slides.length) cards.push(mkCard());
  if (cards.length > slides.length) cards.splice(slides.length);

  var thumbnails = e.data.thumbnails || (thumbnail ? [thumbnail] : []);
  gThumbnails = thumbnails.slice();
  slides.forEach(function(s, i) {
    var c = cards[i];
    if (s.tag)   c.tag   = s.tag;
    if (s.title) c.title = s.title;
    if (s.body)  c.body  = s.body;
    var img = thumbnails.length > 0 ? thumbnails[i % thumbnails.length] : null;
    if (img) {
      c.imgSrc = img;
      c.crop   = {x: .5, y: .5, sc: 1};
      c.layout = 'top';
      c.imgFilter = 'none';
    }
  });

  ai = 0;
  _pvSig = null;
  _pvScale = 0;
  renderAll();
});

// ── postMessage: 공식 채널 이미지 적용 ──
window.addEventListener('message', function(e) {
  if (!e.data || e.data.type !== 'setCardImage') return;
  var url = e.data.url;
  var idx = (typeof e.data.cardIdx === 'number') ? e.data.cardIdx : ai;
  if (!url || !cards[idx]) return;
  cards[idx].imgSrc = url;
  cards[idx].crop   = {x: .5, y: .5, sc: 1};
  if (cards[idx].layout === 'text') cards[idx].layout = 'top';
  if (idx === ai) renderAll();
  else { var prev=ai; ai=idx; renderAll(); ai=prev; renderAll(); }
});

// ── 부모 창에 준비 완료 신호 전송 ──
// React hydration 타이밍 문제를 피하기 위해 cardmaker 측에서 직접 ready 신호를 보냄
if (window.parent && window.parent !== window) {
  window.parent.postMessage({ type: 'cardmakerReady' }, '*');
}
</script>
