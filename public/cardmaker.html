<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>K-POP 카드뉴스 제작기</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link id="gfontLink" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Black+Han+Sans&family=Nanum+Myeongjo:wght@400;700;800&family=Gothic+A1:wght@400;700;900&family=Space+Grotesk:wght@400;700&family=Montserrat:wght@400;700;900&family=Be+Vietnam+Pro:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#bef264;--purple:#a78bfa;
  --dark:#0D0D0F;--border:rgba(255,255,255,0.08);
  --tp:#F0F0F5;--ts:rgba(240,240,245,0.72);--tt:rgba(240,240,245,0.35);
  --font:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
  --bg-app:#0D0D0F;
  --bg-left:#0C0C0E;
  --bg-mid:#111113;
  --bg-right:#0A0A0C;
  --bg-input:rgba(255,255,255,0.04);
  --bg-input-focus:rgba(190,242,100,0.03);
  --bd-input:rgba(255,255,255,0.12);
  --bg-card-item:rgba(255,255,255,0.02);
  --bg-card-hover:rgba(255,255,255,0.05);
  --scrollbar:rgba(255,255,255,0.09);
  --stroke:rgba(255,255,255,0.14);      /* universal component border */
  --stroke-hover:rgba(255,255,255,0.28);
  --track-bg:rgba(255,255,255,0.12);    /* slider track */
}
.light{
  --dark:#F4F4F8;--border:rgba(0,0,0,0.07);
  --tp:#18181F;--ts:rgba(24,24,31,0.58);--tt:rgba(24,24,31,0.32);
  --bg-app:#EEEEF3;
  --bg-left:#F8F8FC;
  --bg-mid:#F1F1F6;
  --bg-right:#FAFAFD;
  --bg-input:rgba(0,0,0,0.04);
  --bg-input-focus:rgba(190,242,100,0.04);
  --bd-input:rgba(0,0,0,0.14);
  --bg-card-item:rgba(0,0,0,0.03);
  --bg-card-hover:rgba(0,0,0,0.06);
  --scrollbar:rgba(0,0,0,0.13);
  --stroke:rgba(0,0,0,0.18);
  --stroke-hover:rgba(0,0,0,0.32);
  --track-bg:rgba(0,0,0,0.13);
}
html,body{font-family:var(--font);background:var(--bg-app);color:var(--tp);height:100%;overflow:hidden;transition:background .2s,color .2s}
.shell{display:flex;height:100vh;user-select:none}

/* ─── LEFT panel ─── */
.pl{width:260px;flex-shrink:0;background:var(--bg-left);border-right:1px solid var(--border);display:flex;flex-direction:column}
.pl-head{padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.pl-head h1{font-size:13px;font-weight:700;letter-spacing:-.02em}
.pl-head p{font-size:10px;color:var(--ts);margin-top:2px}
.pl-list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:4px}
.pl-list::-webkit-scrollbar{width:3px}
.pl-list::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:2px}
.ct{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;border:1px solid transparent;cursor:pointer;transition:background .13s,border-color .13s,opacity .13s;background:var(--bg-card-item)}
.ct:hover{background:var(--bg-card-hover);border-color:var(--border)}
.ct.on{background:rgba(190,242,100,0.07);border-color:rgba(190,242,100,0.28)}
.ct.drag-over-top{border-top:2px solid var(--pink)}
.ct.drag-over-bot{border-bottom:2px solid var(--pink)}
.ct.dragging{opacity:.35}
.ct-n{width:24px;height:24px;border-radius:5px;background:var(--bg-card-item);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--ts);flex-shrink:0}
.ct.on .ct-n{background:var(--pink);color:#09090b}
.ct-i{flex:1;min-width:0}
.ct-t{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ct-s{font-size:9px;color:var(--ts);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ct-d{width:18px;height:18px;border-radius:3px;border:none;background:transparent;cursor:pointer;color:var(--ts);font-size:13px;opacity:0;transition:opacity .13s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.ct:hover .ct-d{opacity:1}
.ct-drag{width:14px;height:18px;display:flex;flex-direction:column;justify-content:center;gap:2.5px;cursor:grab;flex-shrink:0;opacity:0;transition:opacity .13s;padding:2px 0}
.ct-drag span{display:block;width:12px;height:1.5px;border-radius:1px;background:var(--ts)}
.ct:hover .ct-drag{opacity:1}
.ct-d:hover{background:rgba(190,242,100,0.18);color:var(--pink)}
.pl-foot{padding:9px;border-top:1px solid var(--border);display:flex;gap:6px;flex-shrink:0}
.btn-add{flex:1;padding:8px;border:1px dashed var(--bd-input);border-radius:6px;background:transparent;color:var(--ts);font-size:11px;font-weight:500;font-family:var(--font);cursor:pointer;transition:all .13s}
.btn-add:hover{border-color:var(--pink);color:var(--pink);background:rgba(190,242,100,0.06)}
.btn-exp{padding:8px 13px;border:none;border-radius:6px;background:var(--pink);color:#09090b;font-size:11px;font-weight:600;font-family:var(--font);cursor:pointer;transition:opacity .13s;white-space:nowrap}
.btn-exp:hover{opacity:.88}

/* ─── MID panel ─── */
.pm{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg-mid);min-width:280px}
.pm-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.pm-lbl{font-size:10px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.08em}
.cb{padding:2px 8px;background:rgba(190,242,100,0.14);color:var(--pink);border-radius:20px;font-size:9px;font-weight:700}
.pm-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:22px}
.pm-body::-webkit-scrollbar{width:3px}
.pm-body::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:2px}
.fg{display:flex;flex-direction:column;gap:8px}
.fl{font-size:10px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.fi,.fta{width:100%;background:var(--bg-input);border:1px solid var(--bd-input);border-radius:6px;color:var(--tp);font-family:var(--font);font-size:13px;padding:8px 12px;resize:none;transition:border-color .13s;outline:none}
.fi:focus,.fta:focus{border-color:rgba(190,242,100,0.5);background:var(--bg-input-focus)}
.fi::placeholder,.fta::placeholder{color:var(--tt)}
.fta{min-height:70px;line-height:1.6}

/* ratio picker */
.rp-group{display:flex;flex-direction:column;gap:5px}
.rp-group-lbl{font-size:9px;font-weight:700;color:var(--tt);text-transform:uppercase;letter-spacing:.07em}
.rp-row{display:flex;gap:5px;flex-wrap:wrap}
.rp-btn{flex:1;min-width:calc(50% - 3px);display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:7px;border:1.5px solid var(--stroke);background:var(--bg-card-item);cursor:pointer;transition:all .13s;font-family:var(--font)}
.rp-btn:hover{border-color:var(--stroke-hover)}
.rp-btn.on{border-color:var(--pink);background:rgba(190,242,100,0.08)}
.rp-ico{flex-shrink:0;color:var(--ts)}
.rp-btn.on .rp-ico{color:var(--pink)}
.rp-info{display:flex;flex-direction:column;align-items:flex-start;min-width:0}
.rp-name{font-size:11px;font-weight:600;color:var(--tp);white-space:nowrap}
.rp-btn.on .rp-name{color:var(--pink)}
.rp-dim{font-size:9px;color:var(--ts)}

/* image upload zone */
.img-zone{border:1.5px dashed var(--stroke);border-radius:10px;padding:20px 16px;text-align:center;cursor:pointer;transition:all .13s;position:relative;overflow:hidden;background:var(--bg-card-item);min-height:88px;display:flex;align-items:center;justify-content:center}
.img-zone:hover{border-color:rgba(167,139,250,0.5);background:rgba(167,139,250,0.06)}
.img-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-ph{pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:6px}
.img-ph svg{opacity:.3}
.img-ph p{font-size:12px;color:var(--ts)}
.img-ph span{font-size:10px;color:var(--tt)}

/* image inner ratio chips */
.ir-row{display:flex;gap:6px;flex-wrap:wrap}
.ir-btn{display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:7px;border:1.5px solid var(--stroke);background:var(--bg-card-item);cursor:pointer;transition:all .13s;font-family:var(--font)}
.ir-btn:hover{border-color:var(--stroke-hover)}
.ir-btn.on{border-color:var(--purple);background:rgba(167,139,250,0.12)}
.ir-icon{flex-shrink:0;color:var(--ts)}
.ir-btn.on .ir-icon{color:var(--purple)}
.ir-name{font-size:10px;font-weight:600;color:var(--ts);white-space:nowrap}
.ir-btn.on .ir-name{color:rgba(190,165,255,1)}
.ir-dim{font-size:8.5px;color:var(--tt);margin-left:1px}

/* ─── CROP UI ─── */
.crop-wrap{border:1px solid rgba(167,139,250,0.4);border-radius:8px;overflow:hidden;background:#000;position:relative}
.crop-viewport{position:relative;overflow:hidden;cursor:grab;-webkit-user-select:none;user-select:none;touch-action:none}
.crop-viewport.dragging{cursor:grabbing}
.crop-viewport canvas{display:block}
.crop-grid{position:absolute;inset:0;pointer-events:none}
.crop-grid line{stroke:rgba(255,255,255,0.18);stroke-width:1}
.crop-grid rect{fill:none;stroke:rgba(255,255,255,0.3);stroke-width:1}
.crop-handle{position:absolute;width:14px;height:14px;border-color:rgba(255,255,255,0.7);border-style:solid}
.crop-handle.tl{top:0;left:0;border-width:2px 0 0 2px;border-radius:2px 0 0 0}
.crop-handle.tr{top:0;right:0;border-width:2px 2px 0 0;border-radius:0 2px 0 0}
.crop-handle.bl{bottom:0;left:0;border-width:0 0 2px 2px;border-radius:0 0 0 2px}
.crop-handle.br{bottom:0;right:0;border-width:0 2px 2px 0;border-radius:0 0 2px 0}
.crop-bar{display:flex;align-items:center;gap:8px;padding:7px 10px;background:rgba(0,0,0,0.5);border-top:1px solid var(--stroke)}
.crop-bar-lbl{font-size:9px;color:var(--ts);white-space:nowrap}
.crop-range{flex:1;accent-color:var(--purple);cursor:pointer;height:3px}
.crop-pct{font-size:9px;font-weight:600;color:rgba(160,130,255,1);min-width:28px;text-align:right}
.crop-reset{padding:3px 9px;border-radius:4px;border:1px solid var(--stroke);background:var(--bg-card-item);color:var(--ts);font-size:9px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .13s}
.crop-reset:hover{border-color:rgba(190,242,100,0.4);color:var(--pink)}
.img-actions{display:flex;gap:6px;margin-top:4px}
.img-btn{flex:1;padding:5px 10px;border-radius:5px;border:1px solid var(--stroke);background:var(--bg-input);color:var(--ts);font-size:10px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .13s;position:relative}
.img-btn:hover{border-color:var(--stroke-hover);color:var(--tp)}
.img-btn.danger{border-color:rgba(190,242,100,0.3);color:rgba(255,120,140,0.9)}
.img-btn.danger:hover{background:rgba(190,242,100,0.08);border-color:rgba(190,242,100,0.5);color:var(--pink)}
.img-btn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

/* layout groups */
.lgrp-wrap{display:flex;flex-direction:column;gap:16px}
.lgrp{display:flex;flex-direction:column;gap:8px}
.lgrp-hd{display:flex;align-items:center;gap:7px}
.lgrp-badge{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:3px 8px;border-radius:4px}
.lgrp-badge.s{background:var(--stroke);color:var(--ts)}
.lgrp-badge.o{background:rgba(190,242,100,0.12);color:rgba(255,130,160,0.95)}
.lgrp-desc{font-size:9px;color:var(--ts)}
.lgrp-row{display:flex;gap:6px;flex-wrap:wrap}
.lpick{flex:1;min-width:calc(25% - 5px);max-width:calc(25% - 5px);padding:0;border-radius:8px;border:1.5px solid var(--stroke);background:var(--bg-card-item);cursor:pointer;transition:all .13s;overflow:hidden;display:flex;flex-direction:column}
.lgrp.og .lpick{min-width:calc(33.33% - 5px);max-width:calc(33.33% - 5px)}
.lpick:hover{border-color:var(--stroke-hover);background:var(--bg-card-hover)}
.lpick.on{border-color:var(--pink);box-shadow:0 0 0 1px var(--pink)}
.lpick svg{width:100%;height:58px;display:block;flex-shrink:0}
.lp-lbl{font-size:8.5px;font-weight:600;color:var(--ts);text-align:center;padding:5px 2px 6px;border-top:1px solid var(--stroke);font-family:var(--font);line-height:1.2}
.lpick.on .lp-lbl{color:var(--pink)}

/* overlay strength */
.ov-box{padding:10px 12px;border-radius:7px;border:1px solid var(--stroke);background:rgba(190,242,100,0.04);transition:opacity .2s}
.ov-box.dim{opacity:.35;pointer-events:none}
.ov-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.ov-hd-lbl{font-size:9px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.07em}
.ov-pct{font-size:10px;font-weight:700;color:var(--pink)}
.ov-hint{font-size:8.5px;color:var(--tt);margin-top:5px}

/* font picker — list style */
.font-list-item{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-radius:7px;border:1.5px solid var(--stroke);background:var(--bg-card-item);cursor:pointer;transition:all .13s;font-family:var(--font);gap:10px;width:100%;text-align:left}
.font-list-item:hover{border-color:var(--stroke-hover);background:var(--bg-card-hover)}
.font-list-item.on{border-color:var(--pink);background:rgba(190,242,100,0.08)}
.font-list-name{font-size:10px;font-weight:600;color:var(--ts);flex-shrink:0;white-space:nowrap}
.font-list-item.on .font-list-name{color:var(--pink)}
.font-list-preview{font-size:15px;font-weight:700;color:var(--tp);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right;flex:1;min-width:0}

/* sliders — no visible track border, just colored fill */
.fsz-row{display:flex;flex-direction:column;gap:12px}
.fsz-item{display:flex;align-items:center;gap:10px}
.fsz-lbl{font-size:10px;font-weight:600;color:var(--ts);width:28px;flex-shrink:0}
.fsz-range,.ov-range,.crop-range{
  -webkit-appearance:none;appearance:none;
  flex:1;height:4px;border-radius:2px;outline:none;cursor:pointer;border:none;
  background:var(--track-bg);
}
.fsz-range::-webkit-slider-thumb,.ov-range::-webkit-slider-thumb,.crop-range::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:16px;height:16px;border-radius:50%;border:none;cursor:pointer;
}
.fsz-range::-webkit-slider-thumb{background:var(--pink)}
.ov-range::-webkit-slider-thumb{background:var(--pink)}
.crop-range::-webkit-slider-thumb{background:var(--purple)}
.fsz-range::-moz-range-thumb,.ov-range::-moz-range-thumb,.crop-range::-moz-range-thumb{
  width:16px;height:16px;border-radius:50%;border:none;cursor:pointer;
}
.fsz-range::-moz-range-thumb{background:var(--pink)}
.ov-range::-moz-range-thumb{background:var(--pink)}
.crop-range::-moz-range-thumb{background:var(--purple)}
.fsz-val{font-size:10px;font-weight:700;color:var(--tp);min-width:32px;text-align:right}

/* overlay strength */
.ov-box{padding:14px 16px;border-radius:9px;border:1px solid var(--stroke);background:rgba(190,242,100,0.04);transition:opacity .2s}
.ov-box.dim{opacity:.35;pointer-events:none}
.ov-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ov-hd-lbl{font-size:10px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.07em}
.ov-pct{font-size:11px;font-weight:700;color:var(--pink)}
.ov-hint{font-size:9px;color:var(--tt);margin-top:8px}

/* ratio picker */
.rp-group{display:flex;flex-direction:column;gap:7px}
.rp-group-lbl{font-size:9px;font-weight:700;color:var(--tt);text-transform:uppercase;letter-spacing:.07em}
.rp-row{display:flex;gap:6px;flex-wrap:wrap}
.rp-btn{flex:1;min-width:calc(50% - 3px);display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;border:1.5px solid var(--stroke);background:var(--bg-card-item);cursor:pointer;transition:all .13s;font-family:var(--font)}
.rp-btn:hover{border-color:var(--stroke-hover)}
.rp-btn.on{border-color:var(--pink);background:rgba(190,242,100,0.08)}
.rp-ico{flex-shrink:0;color:var(--ts)}
.rp-btn.on .rp-ico{color:var(--pink)}
.rp-info{display:flex;flex-direction:column;align-items:flex-start;min-width:0}
.rp-name{font-size:10px;font-weight:600;color:var(--tp);white-space:nowrap}
.rp-btn.on .rp-name{color:var(--pink)}
.rp-dim{font-size:9px;color:var(--ts)}
.ai-gen-box{border:1.5px solid var(--stroke);border-radius:8px;background:rgba(167,139,250,0.04);overflow:hidden}
.ai-gen-header{display:flex;align-items:center;gap:6px;padding:8px 10px;border-bottom:1px solid var(--stroke)}
.ai-gen-icon{width:16px;height:16px;flex-shrink:0;color:rgba(160,130,255,0.9)}
.ai-gen-title{font-size:10px;font-weight:700;color:rgba(160,130,255,0.95);letter-spacing:.04em;flex:1}
.ai-gen-body{padding:10px}
.ai-prompt-wrap{position:relative}
.ai-prompt{width:100%;background:var(--bg-input);border:1px solid var(--stroke);border-radius:6px;color:var(--tp);font-family:var(--font);font-size:12px;padding:8px 10px;resize:none;height:60px;line-height:1.5;outline:none;transition:border-color .13s}
.ai-prompt:focus{border-color:rgba(167,139,250,0.5)}
.ai-prompt::placeholder{color:var(--tt)}
.ai-style-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px}
.ai-style-btn{padding:3px 8px;border-radius:4px;border:1px solid var(--stroke);background:var(--bg-card-item);color:var(--ts);font-size:9px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .13s}
.ai-style-btn:hover{border-color:rgba(167,139,250,0.4);color:rgba(190,165,255,0.9)}
.ai-style-btn.on{border-color:var(--purple);background:rgba(167,139,250,0.14);color:rgba(200,175,255,1)}
.ai-gen-btn{margin-top:8px;width:100%;padding:8px;border:none;border-radius:6px;background:linear-gradient(135deg,rgba(167,139,250,0.85),rgba(99,60,200,0.85));color:#fff;font-size:11px;font-weight:600;font-family:var(--font);cursor:pointer;transition:opacity .13s;display:flex;align-items:center;justify-content:center;gap:6px}
.ai-gen-btn:hover{opacity:.88}
.ai-gen-btn:disabled{opacity:.45;cursor:not-allowed}
.ai-result{margin-top:8px;border-radius:6px;overflow:hidden;position:relative;background:rgba(0,0,0,0.3)}
.ai-result img{width:100%;display:block;border-radius:6px}
.ai-result-actions{display:flex;gap:5px;margin-top:5px}
.ai-result-btn{flex:1;padding:5px;border-radius:5px;border:1px solid var(--stroke);background:var(--bg-input);color:var(--ts);font-size:10px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .13s;text-align:center}
.ai-result-btn:hover{border-color:var(--stroke-hover);color:var(--tp)}
.ai-result-btn.use{border-color:rgba(167,139,250,0.4);color:rgba(190,165,255,0.9)}
.ai-result-btn.use:hover{background:rgba(167,139,250,0.12);border-color:var(--purple);color:#fff}
.ai-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:24px 0}
.ai-spinner{width:28px;height:28px;border:2.5px solid rgba(167,139,250,0.2);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-loading-txt{font-size:10px;color:var(--ts)}

/* palette */
.pick-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--stroke);background:var(--bg-card-item);color:var(--ts);font-size:11px;font-weight:500;font-family:var(--font);cursor:pointer;transition:all .13s}
.pick-btn:hover{border-color:var(--stroke-hover);color:var(--tp)}
.pick-btn.on{border-color:var(--pink);background:rgba(190,242,100,0.09);color:var(--pink)}

/* ─── RESIZER ─── */
.resizer{width:5px;flex-shrink:0;background:transparent;cursor:col-resize;position:relative;z-index:10;transition:background .15s}
.resizer:hover,.resizer.active{background:rgba(190,242,100,0.35)}
.resizer::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1px;height:32px;background:rgba(255,255,255,0.12);border-radius:1px}
.resizer:hover::after,.resizer.active::after{background:var(--pink);height:48px}

/* ─── TRANSLATION panel ─── */
.pt{width:220px;flex-shrink:0;background:var(--bg-left);border-left:1px solid var(--border);display:none;flex-direction:column}
.pt-head{padding:12px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pt-head-label{font-size:10px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.08em}
.pt-translate-btn{padding:4px 10px;border:1px solid var(--stroke);border-radius:5px;background:var(--bg-card-item);color:var(--ts);font-size:9px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .13s}
.pt-translate-btn:hover{border-color:var(--purple);color:var(--purple);background:rgba(167,139,250,0.08)}
.pt-translate-btn:disabled{opacity:.35;cursor:default}
.pt-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px}
.pt-body::-webkit-scrollbar{width:3px}
.pt-body::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:2px}
.pt-section{display:flex;flex-direction:column;gap:5px}
.pt-label{font-size:9px;font-weight:700;color:var(--tt);text-transform:uppercase;letter-spacing:.07em}
.pt-text{font-size:12px;color:var(--tp);line-height:1.6;word-break:keep-all}
.pt-divider{height:1px;background:var(--border);flex-shrink:0}
.pt-empty{font-size:11px;color:var(--tt);text-align:center;padding:32px 0;line-height:1.7}
.pt-loading{display:flex;flex-direction:column;align-items:center;gap:8px;padding:24px 0}
.pt-spin{width:18px;height:18px;border:2px solid var(--stroke);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite}
.pt-loading-t{font-size:10px;color:var(--tt)}
.pt-badge{display:inline-block;font-size:8px;font-weight:700;padding:2px 6px;border-radius:10px;background:rgba(167,139,250,.14);color:var(--purple);margin-bottom:4px}
/* ─── RIGHT panel ─── */
.pr{flex-shrink:0;background:var(--bg-right);border-left:1px solid var(--border);display:flex;flex-direction:column;min-width:240px}
.pr-head{padding:12px 16px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.08em;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.nav-wrap{display:flex;gap:3px}
.nav-btn{width:24px;height:24px;border:1px solid var(--stroke);border-radius:5px;background:var(--bg-card-item);color:var(--ts);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .13s}
.nav-btn:hover:not(:disabled){border-color:var(--stroke-hover);color:var(--tp)}
.nav-btn:disabled{opacity:.28;cursor:default}
.pr-area{flex:1;overflow-y:auto;display:flex;align-items:center;justify-content:center;padding:24px 20px;background:#141416}
.pr-area::-webkit-scrollbar{width:3px}
.pr-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.07);border-radius:2px}
.pr-foot{padding:10px 14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:7px;flex-shrink:0}
.pr-save-row{display:flex;gap:6px}
.pr-save-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 10px;border-radius:7px;border:1.5px solid var(--stroke);background:var(--bg-card-item);color:var(--ts);font-size:10px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .13s}
.pr-save-btn:hover{border-color:var(--pink);color:var(--pink);background:rgba(190,242,100,0.06)}
.pr-save-btn.primary{background:var(--pink);border-color:transparent;color:#09090b}
.pr-save-btn.primary:hover{opacity:.88}
.pr-copy-row{display:flex;align-items:center;gap:6px;background:var(--bg-input);border:1px solid var(--stroke);border-radius:7px;padding:6px 10px}
.pr-copy-url{flex:1;font-size:10px;color:var(--tp);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:monospace;font-weight:500}
.pr-copy-btn{padding:3px 9px;border-radius:4px;border:1px solid var(--stroke);background:var(--bg-card-item);color:var(--ts);font-size:9px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .13s;white-space:nowrap;flex-shrink:0}
.pr-copy-btn:hover{border-color:var(--stroke-hover);color:var(--tp)}

/* ─── SAVE SPLIT BUTTON ─── */
.save-split{position:relative;display:flex;border-radius:7px}
.save-main{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 12px;border-radius:7px 0 0 7px;border:none;background:var(--pink);color:#09090b;font-size:11px;font-weight:700;font-family:var(--font);cursor:pointer;transition:opacity .13s}
.save-main:hover{opacity:.88}
.save-arrow{width:34px;display:flex;align-items:center;justify-content:center;border-radius:0 7px 7px 0;border:none;border-left:1.5px solid rgba(0,0,0,0.18);background:var(--pink);color:#09090b;font-size:12px;cursor:pointer;transition:background .13s,opacity .13s;flex-shrink:0;position:relative}
.save-arrow:hover{background:rgba(190,242,100,0.85)}
.save-arrow::after{content:'JPG·더보기';position:absolute;bottom:calc(100% + 6px);right:0;background:rgba(0,0,0,0.82);color:#fff;font-size:9px;font-weight:600;white-space:nowrap;padding:4px 7px;border-radius:5px;pointer-events:none;opacity:0;transform:translateY(4px);transition:opacity .15s,transform .15s}
.save-arrow:hover::after{opacity:1;transform:translateY(0)}
.save-drop{position:absolute;bottom:calc(100% + 6px);right:0;min-width:136px;background:var(--bg-left);border:1px solid var(--border);border-radius:8px;padding:4px;box-shadow:0 8px 24px rgba(0,0,0,.55);z-index:50;display:none}
.save-drop.open{display:block}
.save-split.open .save-arrow{background:rgba(190,242,100,0.85);transform:none}
.save-split.open .save-arrow::before{content:'';display:inline-block;transform:rotate(180deg)}
.save-drop-item{display:flex;align-items:center;gap:7px;padding:8px 11px;border-radius:6px;font-size:11px;font-weight:600;color:var(--tp);font-family:var(--font);cursor:pointer;transition:background .13s;white-space:nowrap}
.save-drop-item:hover{background:var(--bg-card-hover);color:var(--pink)}

/* ─── SECTION HEADERS ─── */
.sec-hd{font-size:9px;font-weight:700;color:var(--tt);text-transform:uppercase;letter-spacing:.1em;padding:14px 0 8px;border-top:1px solid var(--stroke);margin-top:2px}
.sec-hd:first-child,.sec-hd-first{border-top:none;padding-top:0}

/* ─── FORMAT CHIPS ─── */
.fmt-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
.fmt-chip{display:inline-flex;align-items:center;gap:4px;padding:6px 13px;border-radius:20px;border:1.5px solid var(--stroke);background:var(--bg-card-item);cursor:pointer;transition:all .13s;font-family:var(--font)}
.fmt-chip:hover{border-color:var(--stroke-hover)}
.fmt-chip.on{border-color:var(--pink);background:rgba(190,242,100,0.1)}
.fmt-chip-name{font-size:11px;font-weight:600;color:var(--ts)}
.fmt-chip.on .fmt-chip-name{color:var(--pink)}
.fmt-chip-dim{font-size:9px;color:var(--tt)}

/* card render */
.cr{overflow:hidden;position:relative;font-family:var(--font);box-shadow:0 20px 56px rgba(0,0,0,0.8);border-radius:14px;animation:cIn .32s cubic-bezier(.34,1.56,.64,1)}
@keyframes cIn{from{opacity:0;transform:translateY(8px) scale(0.96)}to{opacity:1;transform:none}}
.cn{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.06em;margin-bottom:8px;width:fit-content}
.cn-s{background:var(--_cnum);color:var(--_cnumt)}
.cn-g{background:rgba(255,255,255,0.13);color:rgba(255,255,255,0.92);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
.ctag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.ctag-a{color:var(--_c1)}
.ctag-l{color:rgba(255,255,255,0.65)}
.ctit{font-weight:800;line-height:1.28;letter-spacing:-.024em;margin-bottom:8px;color:#fff}
.cbod{font-size:11px;font-weight:400;line-height:1.7}
.cbod-d{color:rgba(255,255,255,0.68)}
.cbod-l{color:rgba(255,255,255,0.82)}
.cft{margin-top:auto;padding-top:10px;display:flex;align-items:center;justify-content:space-between}
.cft-l{border-top:1px solid rgba(255,255,255,0.1)}
.cft-g{border-top:1px solid rgba(255,255,255,0.07)}
.cbrand{font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.3)}
.cdots{display:flex;gap:3px}
.cdot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.2)}
.cdot.a{background:var(--_c1)}

/* modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:100;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.mb{background:var(--bg-left);border:1px solid var(--border);border-radius:12px;padding:20px;width:320px;animation:mIn .22s ease}
@keyframes mIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.mb h3{font-size:13px;font-weight:700;margin-bottom:10px}
.m-ta{width:100%;background:var(--bg-input);border:1px solid var(--stroke);border-radius:6px;color:var(--ts);font-size:10px;font-family:monospace;padding:8px 10px;resize:none;min-height:100px;outline:none}
.m-btns{display:flex;gap:6px;margin-top:9px}
.m-btn{flex:1;padding:7px;border-radius:6px;border:1px solid var(--stroke);background:var(--bg-input);color:var(--tp);font-size:11px;font-weight:500;font-family:var(--font);cursor:pointer;transition:all .13s}
.m-btn.p{background:linear-gradient(135deg,var(--pink),var(--purple));border-color:transparent}
.m-btn:hover{opacity:.84}
.empty-st{text-align:center;padding:32px 16px;color:var(--ts)}
.empty-st svg{margin-bottom:8px;opacity:.18}
.empty-st p{font-size:11px;line-height:1.6}

/* ─── MOBILE ─── */
.mob-tabs{display:none}
@media(max-width:640px){
  .shell{position:relative;padding-bottom:54px}
  .resizer{display:none!important}
  .pl,.pm,.pr,.pt{
    position:absolute!important;top:0;left:0;right:0;bottom:0;
    width:100%!important;min-width:0!important;
    display:none!important;border:none!important
  }
  .pl.mob-on,.pm.mob-on,.pr.mob-on{display:flex!important}
  .mob-tabs{
    display:flex;position:fixed;bottom:0;left:0;right:0;height:54px;
    background:var(--bg-left);border-top:1px solid var(--border);z-index:200
  }
  .mob-tab{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;border:none;background:none;cursor:pointer;
    font-size:9px;font-weight:700;color:var(--ts);font-family:var(--font);
    letter-spacing:.04em;text-transform:uppercase;transition:color .13s
  }
  .mob-tab.on{color:var(--pink)}
  .mob-tab svg{opacity:.6}
  .mob-tab.on svg{opacity:1}
  .pr-area{padding-bottom:8px}
}
.save-all-btn{display:flex;align-items:center;justify-content:center;gap:5px;padding:9px 11px;border-radius:7px;border:1.5px solid var(--stroke);background:var(--bg-card-item);color:var(--ts);font-size:10px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .13s;white-space:nowrap;flex-shrink:0}
.save-all-btn:hover{border-color:var(--pink);color:var(--pink);background:rgba(190,242,100,0.06)}
.save-all-btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.batch-url-wrap{display:none;flex-direction:column;gap:5px}
.batch-url-wrap.open{display:flex}
.batch-url-header{display:flex;align-items:center;justify-content:space-between}
.batch-url-title{font-size:10px;font-weight:700;color:var(--ts)}
.batch-url-list{display:flex;flex-direction:column;gap:4px}
.batch-url-item{display:flex;align-items:center;gap:6px;background:var(--bg-input);border:1px solid var(--stroke);border-radius:7px;padding:5px 10px}
.batch-url-num{font-size:9px;font-weight:700;color:var(--tt);flex-shrink:0;min-width:14px;text-align:center}
.batch-url-txt{flex:1;font-size:10px;color:var(--tp);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:monospace;font-weight:500}
.batch-url-copy{padding:3px 8px;border-radius:4px;border:1px solid var(--stroke);background:var(--bg-card-item);color:var(--ts);font-size:9px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .13s;white-space:nowrap;flex-shrink:0}
.batch-url-copy:hover{border-color:var(--stroke-hover);color:var(--tp)}
.batch-url-copy:disabled{opacity:.38;cursor:not-allowed}
.batch-progress{font-size:11px;color:var(--tt);text-align:center;padding:7px 0}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
<div class="shell">

<!-- LEFT -->
<div class="pl">
  <div class="pl-head">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <h1>K-POP 카드뉴스 제작기</h1>
        <p>카드를 추가하고 직접 편집하세요</p>
      </div>
      <button id="themeBtn" title="라이트/다크 전환" style="width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card-item);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .13s;flex-shrink:0;color:var(--ts)">
        <svg id="themeIco" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 1v1M8 14v1M1 8h1M14 8h1M3.05 3.05l.7.7M12.25 12.25l.7.7M3.05 12.95l.7-.7M12.25 3.75l.7-.7M11 8A3 3 0 1 1 5 8a3 3 0 0 1 6 0z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="pl-list" id="cList"></div>

  <div class="pl-foot">
    <button class="btn-add" id="btnAdd">+ 카드 추가</button>
  </div>
</div>

<!-- MID -->
<div class="pm">
  <div class="pm-head">
    <span class="pm-lbl">편집</span>
    <span class="cb" id="eBadge">—</span>
  </div>
  <div class="pm-body" id="eBody">
    <div style="color:var(--tt);font-size:11px;text-align:center;padding:32px 0">왼쪽에서 카드를 선택하거나 추가하세요</div>
  </div>
</div>

<!-- RIGHT -->
<div class="resizer" id="resizer"></div>
<div class="pr" id="prPanel">
  <div class="pr-head">
    <span>미리보기</span>
    <div class="nav-wrap">
      <button class="nav-btn" id="navP">‹</button>
      <button class="nav-btn" id="navN">›</button>
    </div>
  </div>
  <div class="pr-area" id="pArea">
    <div class="empty-st">
      <svg width="42" height="42" viewBox="0 0 42 42" fill="none"><rect x="6" y="6" width="30" height="30" rx="6" stroke="white" stroke-width="1.7"/><path d="M14 21h14" stroke="white" stroke-width="1.7" stroke-linecap="round"/></svg>
      <p>카드를 추가하면<br/>미리보기가 표시됩니다</p>
    </div>
  </div>
  <div class="pr-foot">
    <div class="pr-save-row">
      <div class="save-split" id="saveSplit">
        <button class="save-main" id="btnSavePng">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v7M3 5l3 3 3-3M1 9v1a1 1 0 001 1h8a1 1 0 001-1V9" stroke="#09090b" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span style="display:flex;flex-direction:column;align-items:flex-start;gap:1px;line-height:1.2">
            <span>PNG 저장</span>
            <span style="font-size:9px;font-weight:500;opacity:.7">현재 카드 1장</span>
          </span>
        </button>
        <button class="save-arrow" id="btnSaveArrow" title="다른 형식으로 저장">▾</button>
        <div class="save-drop" id="saveDrop">
          <div class="save-drop-item" id="btnSaveJpg">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v7M3 5l3 3 3-3M1 9v1a1 1 0 001 1h8a1 1 0 001-1V9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            JPG로 저장
          </div>
        </div>
      </div>
      <button class="save-all-btn" id="btnSaveAll" title="전체 카드 ZIP 다운로드 + 공유 링크 생성">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 7v3a1 1 0 001 1h8a1 1 0 001-1V7M6 1v6M3 4l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span style="display:flex;flex-direction:column;align-items:flex-start;gap:1px;line-height:1.2">
          <span>전체 저장</span>
          <span id="saveAllSub" style="font-size:9px;font-weight:500;opacity:.7">ZIP · <span id="saveAllCount">0</span>장</span>
        </span>
      </button>
    </div>
    <div class="pr-copy-row" id="imgUrlRow">
      <span class="pr-copy-url" id="imgUrlTxt" style="color:var(--tt)">저장 후 공유 링크가 생성됩니다</span>
      <button class="pr-copy-btn" id="btnCopyUrl" disabled style="opacity:.4">복사</button>
    </div>
    <div class="batch-url-wrap" id="batchUrlWrap">
      <div class="batch-url-header">
        <span class="batch-url-title">전체 URL 목록</span>
        <button class="pr-copy-btn" id="btnCopyAllUrls" disabled style="opacity:.4">전체 복사</button>
      </div>
      <div class="batch-url-list" id="batchUrlList"></div>
    </div>
  </div>
</div>

<!-- TRANSLATION PANEL -->
<div class="pt" id="ptPanel">
  <div class="pt-head">
    <span class="pt-head-label">🇰🇷 한국어 번역</span>
    <button class="pt-translate-btn" id="ptBtn" onclick="translateCard()">번역</button>
  </div>
  <div class="pt-body" id="ptBody">
    <div class="pt-empty">카드를 선택하면<br/>한국어 번역이 표시됩니다</div>
  </div>
</div>

<!-- MOBILE TABS -->
<div class="mob-tabs" id="mobTabs">
  <button class="mob-tab" id="mt-pl" onclick="mobSwitch('pl')">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="3" width="14" height="2.5" rx="1.2" fill="currentColor"/><rect x="2" y="7.5" width="14" height="2.5" rx="1.2" fill="currentColor"/><rect x="2" y="12" width="9" height="2.5" rx="1.2" fill="currentColor"/></svg>
    목록
  </button>
  <button class="mob-tab on" id="mt-pm" onclick="mobSwitch('pm')">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="14" height="14" rx="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M5 6h8M5 9h6M5 12h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
    편집
  </button>
  <button class="mob-tab" id="mt-pr" onclick="mobSwitch('pr')">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="3" y="2" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><rect x="5.5" y="4.5" width="7" height="5" rx="1" fill="currentColor" opacity=".5"/><path d="M5.5 12h7M5.5 14h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
    미리보기
  </button>
</div>
</div>

<script>
/* ══ CONSTANTS ══ */
const FONTS=[
  {id:'pretendard',   l:'Pretendard',     vi:false, stack:"'Pretendard Variable','Pretendard',-apple-system,sans-serif", prev:'K-POP NOW'},

/* ══ CROP ENGINE ══
   Computes what portion of the original image to draw so that:
   - image fills targetW × targetH at the chosen zoom
   - focal point crop.x/y stays centred
*/
function getCropTransform(imgW,imgH,targetW,targetH,crop){
  // Scale image to cover target (never smaller than target)
  const fit=Math.max(targetW/imgW, targetH/imgH);
  const sc=fit*crop.sc;
  const scaledW=imgW*sc, scaledH=imgH*sc;

  // Focal point in scaled-image coords
  const fx=crop.x*scaledW;
  const fy=crop.y*scaledH;

  // Top-left of the view window in scaled-image coords
  let vx=fx - targetW/2;
  let vy=fy - targetH/2;

  // Clamp so we never go outside image bounds
  vx=Math.max(0, Math.min(scaledW-targetW, vx));
  vy=Math.max(0, Math.min(scaledH-targetH, vy));

  // Convert back to source image coords
  return {
    sx: vx/sc,
    sy: vy/sc,
    sw: targetW/sc,
    sh: targetH/sc,
    dw: targetW,
    dh: targetH
  };
}

/* Draw onto canvas element — DPR-aware for crisp rendering */
function drawCropCanvas(c, canvas){
  if(!c.imgSrc||!canvas)return;
  // canvas.width/height are the actual pixel buffer size (may be DPR-scaled)
  const W=canvas.width, H=canvas.height;
  const ctx=canvas.getContext('2d');
  // CSS filter: 브라우저 호환성 높음 (ctx.filter는 Safari 구버전 미지원)
  canvas.style.filter = c.imgFilter || 'none';
  getImg(c.imgSrc).then(img=>{
    const iw=img.naturalWidth, ih=img.naturalHeight;
    const t=getCropTransform(iw,ih,W,H,c.crop);
    ctx.clearRect(0,0,W,H);
    ctx.drawImage(img, t.sx, t.sy, t.sw, t.sh, 0, 0, W, H);
  });
}

/* Image cache to avoid repeated loads */
const _imgCache={};
function getImg(src){
  if(_imgCache[src]) return Promise.resolve(_imgCache[src]);
  /* 외부 URL(http/https)은 프록시를 통해 로드 → canvas tainted 방지.
     crossOrigin='anonymous' + 프록시의 Access-Control-Allow-Origin:* 조합으로
     toDataURL() 호출이 가능해진다. data:, blob:, 상대 경로는 프록시 불필요. */
  const isExternal=/^https?:\/\//i.test(src);
  const loadSrc=isExternal?'/api/proxy-image?url='+encodeURIComponent(src):src;
  return new Promise((res,rej)=>{
    const img=new Image();
    if(isExternal) img.crossOrigin='anonymous';
    img.onload=()=>{_imgCache[src]=img;res(img);};
    img.onerror=rej;
    img.src=loadSrc;
  });
}

/* Produce a high-res cropped dataURL */
function bakeCrop(c,targetW,targetH){
  if(!c.imgSrc) return Promise.resolve(null);
  return getImg(c.imgSrc).then(img=>{
    const t=getCropTransform(img.naturalWidth,img.naturalHeight,targetW,targetH,c.crop);
    const cnv=document.createElement('canvas');
    cnv.width=targetW; cnv.height=targetH;
    cnv.getContext('2d').drawImage(img, t.sx, t.sy, t.sw, t.sh, 0, 0, targetW, targetH);
    return cnv.toDataURL('image/jpeg',.93);
  });
}

/* ══ CROP UI ══ */
function buildCropUI(c, container){
  const r=RATIOS[c.ratio]||RATIOS.portrait;
  const isOv=OL.some(l=>l.id===c.layout);
  const isSplit=(c.layout==='split');

  // Use actual container width for crop display
  const CW=Math.max(200, (container.offsetWidth||258) - 2); // -2 for border

  let cropH;
  if(isOv){
    cropH=Math.round(CW*r.h/r.w);
  }else if(isSplit){
    cropH=Math.round(CW*r.h/(r.w*0.46));
  }else{
    const ir=IMG_RATIOS.find(x=>x.id===c.imgRatio)||IMG_RATIOS[0];
    const maxStripH=Math.round(r.h*0.65);
    const stripH=Math.min(Math.round(r.w/ir.ar), maxStripH);
    cropH=Math.round(CW*(stripH/r.w));
  }
  const dh=cropH;
  const zv=Math.round(c.crop.sc*100);

  container.innerHTML=`
<div class="crop-wrap">
  <div class="crop-viewport" id="cpV" style="width:${CW}px;height:${dh}px;cursor:move">
    <canvas id="cpC" width="${CW}" height="${dh}"></canvas>
    <svg class="crop-grid" viewBox="0 0 ${CW} ${dh}">
      <line x1="${CW/3}"   y1="0"   x2="${CW/3}"   y2="${dh}"/>
      <line x1="${CW*2/3}" y1="0"   x2="${CW*2/3}" y2="${dh}"/>
      <line x1="0" y1="${dh/3}"   x2="${CW}" y2="${dh/3}"/>
      <line x1="0" y1="${dh*2/3}" x2="${CW}" y2="${dh*2/3}"/>
      <rect x="0.5" y="0.5" width="${CW-1}" height="${dh-1}"/>
    </svg>
    <div class="crop-handle tl"></div><div class="crop-handle tr"></div>
    <div class="crop-handle bl"></div><div class="crop-handle br"></div>
  </div>
  <div class="crop-bar">
    <span class="crop-bar-lbl">확대</span>
    <input type="range" class="crop-range" id="cpZ" min="100" max="350" step="5" value="${zv}"/>
    <span class="crop-pct" id="cpZv">${zv}%</span>
    <button class="crop-reset" id="cpRst">초기화</button>
  </div>
</div>`;

  const cnv=document.getElementById('cpC');
  drawCropCanvas(c, cnv);

  let cachedImg=_imgCache[c.imgSrc]||null;

  /* ── sc 기준: 100% = 커버 피팅 (이미지가 뷰포트를 빈 칸 없이 딱 채우는 최소 배율)
     슬라이더 min=100 → 사용자가 100%까지 축소 가능.
     calcDefaultSc: 이미지 첫 로드 시 양축에 작은 여유(약 10%)를 줘서
     처음부터 상하좌우 팬이 가능하도록 자동 설정. 사용자가 슬라이더로 100%로 되돌릴 수 있다. */
  function calcDefaultSc(iw,ih){
    /* 각 축에 뷰포트 크기의 10% 여유 → 처음부터 양방향 팬 가능, 과도한 줌 없음 */
    const baseFit=Math.max(CW/iw, dh/ih);
    return Math.max(
      (CW + CW*0.10)/(iw*baseFit),
      (dh + dh*0.10)/(ih*baseFit),
      1.0
    );
  }
  function applyMinSc(){
    if(!cachedImg)return;
    const iw=cachedImg.naturalWidth, ih=cachedImg.naturalHeight;
    const sl=document.getElementById('cpZ');
    /* 슬라이더 min은 항상 100 (커버 피팅 최솟값) — 사용자가 100%까지 축소 가능 */
    if(sl) sl.min=100;
    /* sc가 1.0 미만이면 커버 피팅 보정 (검은 여백 방지) */
    if(c.crop.sc < 1.0){
      c.crop.sc=1.0;
      if(sl){sl.value=100; document.getElementById('cpZv').textContent='100%';}
      drawCropCanvas(c, document.getElementById('cpC'));
      renderPreview();
      return;
    }
    /* 첫 로드(sc===1)일 때만 기본 줌을 자동 설정해 양방향 팬 여유 확보 */
    if(c.crop.sc===1){
      const defSc=calcDefaultSc(iw,ih);
      if(defSc>1){
        c.crop.sc=defSc;
        const pct=Math.round(defSc*100);
        if(sl){sl.value=pct; document.getElementById('cpZv').textContent=pct+'%';}
        drawCropCanvas(c, document.getElementById('cpC'));
        renderPreview();
      }
    }
  }

  /* 이미지가 이미 캐시돼 있으면 즉시 적용, 아니면 로드 후 적용 */
  if(cachedImg) applyMinSc();
  getImg(c.imgSrc).then(img=>{cachedImg=img; applyMinSc();});

  /* ── AbortController로 이전 buildCropUI 호출의 window 리스너를 정리 ──
     renderAll() 이 반복 호출되면 mousemove 리스너가 누적되는 문제를 방지한다. */
  if(window._cropAbort) window._cropAbort.abort();
  window._cropAbort=new AbortController();
  const _sig=window._cropAbort.signal;

  const vp=document.getElementById('cpV');
  function startDrag(px,py){
    cropDrag={c, startX:px, startY:py, startCX:c.crop.x, startCY:c.crop.y, dh};
    vp.classList.add('dragging');
  }
  function moveDrag(px,py){
    if(!cropDrag||cropDrag.c!==c)return;
    if(!cachedImg)return;
    const iw=cachedImg.naturalWidth, ih=cachedImg.naturalHeight;
    const baseFit=Math.max(CW/iw, dh/ih);
    /* 드래그 중 sc가 1.0 미만이면 커버 피팅 보정 (검은 여백 방지) */
    if(c.crop.sc<1.0) c.crop.sc=1.0;
    const sc=baseFit*c.crop.sc;
    const sw=iw*sc, sh=ih*sc;
    c.crop.x=Math.max(0,Math.min(1, cropDrag.startCX-(px-cropDrag.startX)/sw));
    c.crop.y=Math.max(0,Math.min(1, cropDrag.startCY-(py-cropDrag.startY)/sh));
    drawCropCanvas(c, document.getElementById('cpC'));
    renderPreview();
  }
  function endDrag(){if(cropDrag){cropDrag=null;vp.classList.remove('dragging')}}

  vp.addEventListener('mousedown',e=>{e.preventDefault();startDrag(e.clientX,e.clientY)});
  window.addEventListener('mousemove',e=>{moveDrag(e.clientX,e.clientY)},{signal:_sig});
  window.addEventListener('mouseup',endDrag,{signal:_sig});
  vp.addEventListener('touchstart',e=>{const t=e.touches[0];startDrag(t.clientX,t.clientY)},{passive:true});
  vp.addEventListener('touchmove',e=>{const t=e.touches[0];moveDrag(t.clientX,t.clientY)},{passive:true});
  vp.addEventListener('touchend',endDrag,{passive:true});

  /* zoom */
  const cpZ=document.getElementById('cpZ');
  if(cpZ) cpZ.addEventListener('input',function(){
    c.crop.sc=+this.value/100;
    const cpZv=document.getElementById('cpZv');
    if(cpZv) cpZv.textContent=this.value+'%';
    drawCropCanvas(c, document.getElementById('cpC'));
    renderPreview();
  });

  /* reset — sc를 1로 초기화 후 applyMinSc로 최솟값 보정 */
  const cpRst=document.getElementById('cpRst');
  if(cpRst) cpRst.addEventListener('click',()=>{
    c.crop.x=.5; c.crop.y=.5; c.crop.sc=1;
    applyMinSc();
    const pct=Math.round(c.crop.sc*100);
    const cpZEl=document.getElementById('cpZ');
    const cpZvEl=document.getElementById('cpZv');
    if(cpZEl) cpZEl.value=pct;
    if(cpZvEl) cpZvEl.textContent=pct+'%';
    drawCropCanvas(c, document.getElementById('cpC'));
    renderPreview();
  });
}

/* ══ SVG THUMBNAILS ══ */
function tSVG(id,c1,c2){
  const W=72,H=50; c1=c1||'#FF3476'; c2=c2||'#a78bfa';
  const base=`<rect width="${W}" height="${H}" fill="#161525"/>`;
  const tex=`<line x1="0" y1="0" x2="${W}" y2="${H}" stroke="rgba(255,255,255,0.04)" stroke-width="1"/><circle cx="13" cy="12" r="4.5" fill="rgba(255,255,255,0.06)"/>`;
  const ph=(x,y,w,h)=>`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="rgba(255,255,255,0.11)"/>${tex}`;
  const ls=(y,a=.65)=>`<rect x="5" y="${y}"   rx="1" width="25" height="2.8" fill="rgba(255,255,255,${a})"/>
<rect x="5" y="${y+6}" rx="1" width="34" height="2"   fill="rgba(255,255,255,${a*.46})"/>
<rect x="5" y="${y+11}"rx="1" width="28" height="2"   fill="rgba(255,255,255,${a*.30})"/>`;
  switch(id){
    case 'imgonly':   return `${base}${ph(0,0,W,H)}<rect x="5" y="${H-14}" rx="1" width="20" height="2.2" fill="rgba(255,255,255,.55)"/><rect x="5" y="${H-9}" rx="1" width="30" height="1.8" fill="rgba(255,255,255,.3)"/>`;
    case 'top':      return `${base}${ph(0,0,W,20)}${ls(25,.58)}`;
    case 'bottom':   return `${base}${ls(4,.58)}${ph(0,30,W,20)}`;
    case 'text':     return `<rect width="${W}" height="${H}" fill="#100F1E"/>
<defs><linearGradient id="tg${id}" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></linearGradient></defs>
<rect x="0" y="0" width="${W}" height="2.5" fill="url(#tg${id})"/>
<ellipse cx="60" cy="40" rx="18" ry="16" fill="${c1}" fill-opacity=".1"/>${ls(13,.56)}`;
    case 'split':    return `${base}${ph(0,0,W/2,H)}<rect x="${W/2}" y="0" width="${W/2}" height="${H}" fill="#100F1E"/>
<rect x="${W/2+4}" y="11" rx="1" width="17" height="2.5" fill="rgba(255,255,255,.58)"/>
<rect x="${W/2+4}" y="17" rx="1" width="23" height="2"   fill="rgba(255,255,255,.3)"/>
<rect x="${W/2+4}" y="22" rx="1" width="18" height="2"   fill="rgba(255,255,255,.2)"/>`;
    case 'bg':       return `${base}${tex}<rect width="${W}" height="${H}" fill="rgba(0,0,0,0.5)"/>${ls(26)}`;
    case 'grad-down':return `${base}${tex}
<defs><linearGradient id="gdD${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="transparent"/><stop offset="100%" stop-color="rgba(0,0,0,0.9)"/></linearGradient></defs>
<rect width="${W}" height="${H}" fill="url(#gdD${id})"/>${ls(26)}`;
    case 'grad-up':  return `${base}${tex}
<defs><linearGradient id="gdU${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(0,0,0,0.88)"/><stop offset="100%" stop-color="transparent"/></linearGradient></defs>
<rect width="${W}" height="${H}" fill="url(#gdU${id})"/>${ls(4)}`;
    case 'grad-left':return `${base}${tex}
<defs><linearGradient id="gdL${id}" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="rgba(0,0,0,0.88)"/><stop offset="100%" stop-color="transparent"/></linearGradient></defs>
<rect width="${W}" height="${H}" fill="url(#gdL${id})"/>${ls(13)}`;
    case 'colorwash':return `${base}${tex}
<defs><linearGradient id="cw${id}" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${c1}" stop-opacity=".7"/><stop offset="100%" stop-color="${c2}" stop-opacity=".55"/></linearGradient></defs>
<rect width="${W}" height="${H}" fill="url(#cw${id})"/>
<rect width="${W}" height="${H}" fill="rgba(0,0,0,.22)"/>${ls(26)}`;
    case 'vignette': return `${base}${tex}
<defs><radialGradient id="vg${id}" cx="50%" cy="50%" r="55%"><stop offset="0%" stop-color="transparent"/><stop offset="100%" stop-color="rgba(0,0,0,0.82)"/></radialGradient></defs>
<rect width="${W}" height="${H}" fill="url(#vg${id})"/>${ls(26)}`;
    default: return base;
  }
}

/* ══ RENDER LIST ══ */
function renderList(){
  const el=document.getElementById('cList');
  if(!cards.length){el.innerHTML='<div style="padding:20px 16px;text-align:center;color:var(--tt);font-size:10px;line-height:1.7">카드가 없습니다<br><span style="color:var(--ts);font-size:11px;font-weight:600">아래 <span style="color:var(--lime)">+ 카드 추가</span> 버튼을 눌러 시작하세요</span></div>';return}
  el.innerHTML=cards.map((c,i)=>`
<div class="ct ${i===ai?'on':''}" data-i="${i}" draggable="true">
  <div class="ct-drag" data-drag="${i}"><span></span><span></span><span></span></div>
  <div class="ct-n">${i+1}</div>
  <div class="ct-i">
    <div class="ct-t">${c.title||'(제목 없음)'}</div>
    <div class="ct-s">${c.tag} · ${AL.find(l=>l.id===c.layout)?.l||''} · ${RATIOS[c.ratio]?.l||''}</div>
  </div>
  <button class="ct-d" data-d="${i}">×</button>
</div>`).join('');

  el.querySelectorAll('.ct').forEach(e=>e.addEventListener('click',ev=>{if(ev.target.dataset.d!==undefined||ev.target.closest('.ct-drag'))return;selCard(+e.dataset.i)}));
  el.querySelectorAll('.ct-d').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();delCard(+b.dataset.d)}));

  // ── 드래그 재배치 ──
  let dragSrc=null;
  el.querySelectorAll('.ct').forEach(item=>{
    item.addEventListener('dragstart',e=>{
      dragSrc=+item.dataset.i;
      e.dataTransfer.effectAllowed='move';
      setTimeout(()=>item.classList.add('dragging'),0);
    });
    item.addEventListener('dragend',()=>{
      item.classList.remove('dragging');
      el.querySelectorAll('.ct').forEach(n=>n.classList.remove('drag-over-top','drag-over-bot'));
      dragSrc=null;
    });
    item.addEventListener('dragover',e=>{
      e.preventDefault();e.dataTransfer.dropEffect='move';
      if(dragSrc===null)return;
      const to=+item.dataset.i;
      if(dragSrc===to)return;
      el.querySelectorAll('.ct').forEach(n=>n.classList.remove('drag-over-top','drag-over-bot'));
      const r=item.getBoundingClientRect();
      item.classList.add(e.clientY<r.top+r.height/2?'drag-over-top':'drag-over-bot');
    });
    item.addEventListener('dragleave',()=>{
      item.classList.remove('drag-over-top','drag-over-bot');
    });
    item.addEventListener('drop',e=>{
      e.preventDefault();
      if(dragSrc===null)return;
      const to=+item.dataset.i;
      if(dragSrc===to)return;
      const r=item.getBoundingClientRect();
      let insertAt=e.clientY<r.top+r.height/2?to:to+1;
      if(insertAt>dragSrc)insertAt--;
      const [moved]=cards.splice(dragSrc,1);
      cards.splice(insertAt,0,moved);
      ai=insertAt;
      renderAll();
    });
  });
}

function bind(id,cb){const e=document.getElementById(id);if(e)e.addEventListener('input',()=>cb(e.value))}

/* ══ RENDER PREVIEW ══ */

let _pvSig = null;
let _pvScale = 1;
let _panelW = 420; // locked panel dimensions — only updated by resizer
let _panelH = 500;

function updatePanelDims(){
  const prPanel=document.getElementById('prPanel');
  const prArea=document.getElementById('pArea');
  if(prPanel&&prPanel.offsetWidth>0)  _panelW=prPanel.offsetWidth;
  if(prArea &&prArea.offsetHeight>60) _panelH=prArea.offsetHeight;
}

function computeScale(rw,rh){
  return Math.min((_panelW-40)/rw, (_panelH-40)/rh, 1.5);
}

function renderPreview(){
  const area=document.getElementById('pArea');
  if(!cards.length){
    _pvSig=null;
    area.innerHTML=`<div class="empty-st"><svg width="42" height="42" viewBox="0 0 42 42" fill="none"><rect x="6" y="6" width="30" height="30" rx="6" stroke="white" stroke-width="1.7"/><path d="M14 21h14" stroke="white" stroke-width="1.7" stroke-linecap="round"/></svg><p>카드를 추가하면<br/>미리보기가 표시됩니다</p><p style="font-size:10px;margin-top:8px;color:var(--tt)">왼쪽 하단 <span style="color:var(--lime);font-weight:700">+ 카드 추가</span> 버튼을 눌러보세요</p></div>`;
    return;
  }
  const idx=ai<0?0:ai;
  const c=cards[idx]; if(!c)return;
  const pal=PAL.find(p=>p.id===c.palette)||PAL[0];
  const fontDef=FONTS.find(f=>f.id===c.font)||FONTS[0];
  const r=RATIOS[c.ratio]||RATIOS.portrait;
  const ov=(c.opacity||55)/100;
  const tsz=c.titleSize||18;
  const bsz=c.bodySize||11;
  const dots=cards.map((_,i)=>`<div class="cdot${i===idx?' a':''}"></div>`).join('');
  const imgId=`pv-img-${idx}`;

  // Scale only recomputed when explicitly invalidated via _pvSig=null + _pvScale=0
  if(_pvScale===0){
    _pvScale=computeScale(r.w,r.h);
  }
  const scaleStyle=`transform:scale(${_pvScale.toFixed(4)});transform-origin:center center;`;
  const cvars=`width:${r.w}px;height:${r.h}px;background:${gBgColor||pal.bg};font-family:${fontDef.stack};--_c1:${pal.c1};--_c2:${pal.c2};--_cnum:${pal.cn};--_cnumt:${pal.ct};`;

  const ir=IMG_RATIOS.find(x=>x.id===c.imgRatio)||IMG_RATIOS[0];
  const maxStripH=Math.round(r.h*0.65);
  const stripH=Math.min(Math.round(r.w/ir.ar), maxStripH);
  const textAreaH=r.h-stripH;
  const BASE_TEXT_H=140;
  const L=c.layout;
  const px=19;
  const scaleFactor=(L==='top'||L==='bottom')?Math.min(1,textAreaH/BASE_TEXT_H):1;
  const effTsz=Math.max(8, Math.round(tsz*scaleFactor));
  const effBsz=Math.max(6,  Math.round(bsz*scaleFactor));
  const py=Math.max(8,Math.round((c.ratio==='square'?13:17)*scaleFactor));

  const tOY=c.textOffsetY||0; // legacy fallback
  const titOY=c.titleOffsetY||0;
  const bodOY=c.bodyOffsetY||0;
  const tTransform=''; // no longer applies whole-block transform

  // Structural signature — anything that changes the DOM tree shape
  const sig=`${idx}|${L}|${c.ratio}|${c.imgRatio}|${!!c.imgSrc}|${c.showFooter}|${c.textPos||'bottom'}|${!!gSource}|${c.imgFilter||'none'}|${c.font||''}|${c.palette||''}|${c.titleSize||''}|${c.bodySize||''}|${c.textAlign||'left'}|${gBgColor||''}|${c.titleOffsetY||0}|${c.bodyOffsetY||0}`;

  const noImgSvg=`<svg width="28" height="28" viewBox="0 0 28 28" fill="none" opacity=".13"><rect x="1" y="4" width="26" height="20" rx="3" stroke="white" stroke-width="1.4"/><circle cx="8.5" cy="11" r="2.3" stroke="white" stroke-width="1.4"/><path d="M1 20l6-5.5 5 4.5 3.5-3 7 6" stroke="white" stroke-width="1.4" stroke-linejoin="round"/></svg>`;

  const ta=c.textAlign||'left';

  function sCnt(){return `${c.tag.trim()?`<div class="ctag ctag-a" id="pv-tag" style="text-align:${ta}">${c.tag}</div>`:'<span id="pv-tag-empty" style="display:none"></span>'}

<div id="pv-overlay" style="position:absolute;inset:0;background:${ovBg}"></div>${colorwashDark}${vignetteDark}

function bh(b){return(b||'본문 내용을 입력하면\n여기에 표시됩니다.').replace(/\n/g,'<br/>')}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// 텍스트 영역 넘침 시 폰트 자동 축소
function shrinkToFit(area){
  const wrap=area.querySelector('#pv-text-wrap');
  if(!wrap) return;
  const titleEl=area.querySelector('#pv-title');
  const bodyEl=area.querySelector('#pv-body');
  if(!titleEl&&!bodyEl) return;
  let iter=0;
  while(wrap.scrollHeight>wrap.clientHeight+3&&iter<30){
    const tsz=titleEl?parseFloat(titleEl.style.fontSize)||14:14;
    const bsz=bodyEl?parseFloat(bodyEl.style.fontSize)||11:11;
    const hitFloor=(tsz<=10&&bsz<=7);
    if(hitFloor) break;
    if(titleEl&&tsz>10) titleEl.style.fontSize=Math.max(10,tsz-1)+'px';
    if(bodyEl&&bsz>7)   bodyEl.style.fontSize=Math.max(7,bsz-1)+'px';
    iter++;
  }
}

/* ══ CARD IMAGE EXPORT ══
   Strategy: read the already-rendered preview DOM + canvases directly.
   The preview already has the correct layout, textPos, footerY, crop etc.
   We composite it at 3× resolution onto an offscreen canvas.
*/
async function renderCardToCanvas(c){
  const r=RATIOS[c.ratio]||RATIOS.portrait;
  const L=c.layout;
  const pal=PAL.find(p=>p.id===c.palette)||PAL[0];
  const ir=IMG_RATIOS.find(x=>x.id===c.imgRatio)||IMG_RATIOS[0];
  const maxStripH=Math.round(r.h*0.65);
  const stripH=Math.min(Math.round(r.w/ir.ar),maxStripH);
  const isOv=OL.some(l=>l.id===L);

  const SAVE_SCALE=3;
  const rw=r.w, rh=r.h;
  const W=rw*SAVE_SCALE, H=rh*SAVE_SCALE;
  const cnv=document.createElement('canvas');
  cnv.width=W; cnv.height=H;
  const ctx=cnv.getContext('2d');
  ctx.scale(SAVE_SCALE,SAVE_SCALE);

  // 1. Background
  ctx.fillStyle=gBgColor||pal.bg;
  ctx.fillRect(0,0,rw,rh);

  // 2. Image — use getCropTransform directly for pixel-perfect crop
  if(c.imgSrc){
    const img=await getImg(c.imgSrc);
    let imgW=rw, imgH=(isOv||L==='imgonly')?rh:stripH, imgX=0, imgY=0;
    if(L==='bottom') imgY=rh-stripH;
    if(L==='split'){imgW=Math.round(rw*.46);imgH=rh;}
    const t=getCropTransform(img.naturalWidth,img.naturalHeight,imgW,imgH,c.crop);
    ctx.save();
    ctx.beginPath();ctx.rect(imgX,imgY,imgW,imgH);ctx.clip();
    ctx.drawImage(img,t.sx,t.sy,t.sw,t.sh,imgX,imgY,imgW,imgH);
    ctx.restore();
  }

  // 3. Overlay
  if(isOv){
    const ov=(c.opacity||55)/100;
    const o2h=n=>Math.round(Math.min(Math.max(n,0),1)*255).toString(16).padStart(2,'0');
    ctx.save();
    if(L==='bg'){ctx.fillStyle=`rgba(0,0,0,${ov})`;ctx.fillRect(0,0,rw,rh);}
    else if(L==='grad-down'){const g=ctx.createLinearGradient(0,rh,0,0);g.addColorStop(0,`rgba(0,0,0,${Math.min(ov+.24,1)})`);g.addColorStop(.5,`rgba(0,0,0,${Math.max(ov-.18,0)})`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,0,rw,rh);}
    else if(L==='grad-up'){const g=ctx.createLinearGradient(0,0,0,rh);g.addColorStop(0,`rgba(0,0,0,${Math.min(ov+.24,1)})`);g.addColorStop(.5,`rgba(0,0,0,${Math.max(ov-.18,0)})`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,0,rw,rh);}
    else if(L==='grad-left'){const g=ctx.createLinearGradient(0,0,rw,0);g.addColorStop(0,`rgba(0,0,0,${Math.min(ov+.24,1)})`);g.addColorStop(.58,`rgba(0,0,0,${Math.max(ov-.22,0)})`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,0,rw,rh);}
    else if(L==='colorwash'){const a1=o2h(ov*.82),a2=o2h(ov*.65);const g=ctx.createLinearGradient(0,0,rw,rh);g.addColorStop(0,pal.c1+a1);g.addColorStop(1,pal.c2+a2);ctx.fillStyle=g;ctx.fillRect(0,0,rw,rh);ctx.fillStyle='rgba(0,0,0,.18)';ctx.fillRect(0,0,rw,rh);}
    else if(L==='vignette'){const g=ctx.createRadialGradient(rw/2,rh/2,0,rw/2,rh/2,Math.max(rw,rh)/2);g.addColorStop(.15,'transparent');g.addColorStop(1,`rgba(0,0,0,${Math.min(ov+.12,1)})`);ctx.fillStyle=g;ctx.fillRect(0,0,rw,rh);ctx.fillStyle=`rgba(0,0,0,${ov*.26})`;ctx.fillRect(0,0,rw,rh);}
    ctx.restore();
  }

  // 4. Text — read positions/sizes from the live preview DOM elements
  const area=document.getElementById('pArea');
  const pvScale=_pvScale||1;

  function domY(el){
    // Get element's top relative to card, accounting for preview scale
    if(!el)return null;
    const cardEl=area.querySelector('.cr');
    const cardRect=cardEl.getBoundingClientRect();
    const elRect=el.getBoundingClientRect();
    return (elRect.top-cardRect.top)/pvScale;
  }
  function domX(el){
    if(!el)return null;
    const cardEl=area.querySelector('.cr');
    const cardRect=cardEl.getBoundingClientRect();
    const elRect=el.getBoundingClientRect();
    return (elRect.left-cardRect.left)/pvScale;
  }
  function domW(el){if(!el)return 0;return el.getBoundingClientRect().width/pvScale;}

  const fontDef=FONTS.find(f=>f.id===c.font)||FONTS[0];
  const ta=c.textAlign||'left';
  const px=19;

  // tag
  const pvTag=area.querySelector('#pv-tag');
  if(pvTag&&c.tag.trim()){
    const tagStyle=getComputedStyle(pvTag);
    const sz=parseFloat(tagStyle.fontSize)||9;
    const y=domY(pvTag); const x=domX(pvTag); const w=domW(pvTag);
    ctx.save();
    ctx.font=`700 ${sz}px ${fontDef.stack}`;
    ctx.fillStyle=isOv?'rgba(255,255,255,0.65)':pal.c1;
    ctx.textAlign=ta==='right'?'right':ta==='center'?'center':'left';
    const ax=ta==='right'?x+w:ta==='center'?x+w/2:x;
    ctx.fillText(c.tag.toUpperCase(),ax,y+sz);
    ctx.restore();
  }

  // title — word-wrap (공백 기준, 한 단어가 너무 길면 그대로 출력)
  const pvTitle=area.querySelector('#pv-title');
  if(pvTitle&&c.title){
    const ts=getComputedStyle(pvTitle);
    const sz=parseFloat(ts.fontSize)||18;
    const lh=sz*1.28;
    const y=domY(pvTitle); const x=domX(pvTitle); const w=domW(pvTitle);
    ctx.save();
    ctx.font=`800 ${sz}px ${fontDef.stack}`;
    ctx.fillStyle=gTextColor||'#fff';
    ctx.textAlign=ta==='right'?'right':ta==='center'?'center':'left';
    const ax=ta==='right'?x+w:ta==='center'?x+w/2:x;
    const rawTLines=c.title.split('\n');
    let cy=y+sz;
    for(const raw of rawTLines){
      const words=raw.split(' ');
      let line='';
      for(const word of words){
        const test=line?line+' '+word:word;
        if(ctx.measureText(test).width>w&&line){
          ctx.fillText(line,ax,cy); line=word; cy+=lh;
        }else{line=test;}
      }
      if(line) ctx.fillText(line,ax,cy);
      cy+=lh;
    }
    ctx.restore();
  }

  // body — word-wrap
  const pvBody=area.querySelector('#pv-body');
  if(pvBody&&c.body){
    const bs=getComputedStyle(pvBody);
    const sz=parseFloat(bs.fontSize)||11;
    const lh=sz*1.7;
    const y=domY(pvBody); const x=domX(pvBody); const w=domW(pvBody);
    ctx.save();
    ctx.font=`400 ${sz}px ${fontDef.stack}`;
    ctx.fillStyle=gTextColor?(gTextColor+'bb'):(isOv?'rgba(255,255,255,0.82)':'rgba(255,255,255,0.68)');
    ctx.textAlign=ta==='right'?'right':ta==='center'?'center':'left';
    const ax=ta==='right'?x+w:ta==='center'?x+w/2:x;
    // wrap text to card width
    const rawLines=c.body.split('\n');
    let cy=y+sz;
    for(const raw of rawLines){
      const words=raw.split(' ');
      let line='';
      for(const word of words){
        const test=line?line+' '+word:word;
        if(ctx.measureText(test).width>w&&line){
          ctx.fillText(line,ax,cy);
          line=word;cy+=lh;
        }else{line=test;}
      }
      ctx.fillText(line,ax,cy);
      cy+=lh;
    }
    ctx.restore();
  }

  // 5. Source credit
  if(gSource){
    ctx.save();
    ctx.font=`400 7px ${fontDef.stack}`;
    ctx.fillStyle='rgba(255,255,255,0.28)';
    ctx.textAlign='right';
    ctx.shadowColor='rgba(0,0,0,0.7)';
    ctx.shadowBlur=3;
    ctx.fillText(gSource, rw-px, rh-6);
    ctx.restore();
  }

  // 6. Footer
  if(c.showFooter){
    const pvFt=area.querySelector('#pv-footer-wrap');
    const ftY=pvFt?domY(pvFt)+10:Math.round((c.footerY??0.88)*rh)+10;
    ctx.save();
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(px,ftY-4);ctx.lineTo(rw-px,ftY-4);ctx.stroke();
    ctx.font=`700 8px ${fontDef.stack}`;
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.textAlign='left';
    ctx.fillText('KPOP NOW',px,ftY+8);
    ctx.restore();
  }

  return cnv;
}

/* ══ DOM-CAPTURE EXPORT ══
   html2canvas로 미리보기 DOM(.cr)을 직접 캡처 → 수동 canvas 재드로우 불필요.
   미리보기와 완전히 동일한 결과를 3× 해상도로 저장.
*/
async function captureCardDOM(c){
  const r=RATIOS[c.ratio]||RATIOS.portrait;
  const area=document.getElementById('pArea');
  const cardEl=area.querySelector('.cr');
  if(!cardEl)return null;

  // html2canvas 지연 로딩 (최초 호출 시만)
  if(!window.html2canvas){
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
      s.onload=res;
      s.onerror=()=>rej(new Error('html2canvas 라이브러리 로드 실패. 인터넷 연결을 확인해주세요.'));
      // 10초 타임아웃
      setTimeout(()=>rej(new Error('html2canvas 로드 시간 초과. 다시 시도해주세요.')),10000);
      document.head.appendChild(s);
    });
  }

  // 카드 요소 클론 (cloneNode는 canvas 픽셀을 복사하지 않음)
  const clone=cardEl.cloneNode(true);

  // 원본 canvas 픽셀 → 클론 canvas로 복사
  const origCnvs=[...cardEl.querySelectorAll('canvas')];
  const cloneCnvs=[...clone.querySelectorAll('canvas')];
  origCnvs.forEach((orig,i)=>{
    try{
      const cl=cloneCnvs[i];
      if(!cl)return;
      cl.width=orig.width; cl.height=orig.height;
      cl.getContext('2d').drawImage(orig,0,0);
      if(orig.style.filter) cl.style.filter=orig.style.filter; // CSS 필터 복사
    }catch(_){}
  });

  // 인라인 style에서 scale 트랜스폼 제거 후 고정 위치로 오프스크린 배치
  let st=clone.getAttribute('style')||'';
  st=st.replace(/\btransform\s*:[^;]+;?\s*/gi,'');
  st=st.replace(/\btransform-origin\s*:[^;]+;?\s*/gi,'');
  clone.setAttribute('style',st);
  clone.style.position='fixed';
  clone.style.left='0'; clone.style.top='0';
  clone.style.zIndex='-1';
  clone.style.pointerEvents='none';
  document.body.appendChild(clone);

  try{
    return await window.html2canvas(clone,{
      scale:3,
      width:r.w, height:r.h,
      x:0, y:0,
      useCORS:true,
      allowTaint:false,
      logging:false,
      backgroundColor:null,
    });
  }finally{
    document.body.removeChild(clone);
  }
}

async function uploadToCloudinary(dataUrl){
  const resp=await fetch('/api/upload',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({dataUrl})
  });
  const data=await resp.json();
  if(!resp.ok) throw new Error(data?.error||'Cloudinary 업로드 실패');
  return data.url;
}

  if(!cards.length)return;
  const c=cards[ai<0?0:ai];
  const btnPng=document.getElementById('btnSavePng');

async function saveAllCards(){
  if(!cards.length)return;
  if(!window.JSZip){alert('JSZip 로딩 중입니다. 잠시 후 다시 시도해주세요.');return;}
  const btn=document.getElementById('btnSaveAll');
  const btnPng=document.getElementById('btnSavePng');
  const batchWrap=document.getElementById('batchUrlWrap');
  const batchList=document.getElementById('batchUrlList');
  const copyAllBtn=document.getElementById('btnCopyAllUrls');

  btn.disabled=true;
  btnPng.disabled=true;
  batchWrap.classList.add('open');
  copyAllBtn.disabled=true;
  copyAllBtn.style.opacity='.4';
  copyAllBtn.dataset.urls='';

  const savedAi=ai;

  function setProgress(msg){
    batchList.innerHTML=`<div class="batch-progress">${msg}</div>`;
  }

  try{
    // ── Phase 1: Render all cards to canvas ──
    const rendered=[];
    for(let i=0;i<cards.length;i++){
      setProgress(`카드 렌더링 중... (${i+1} / ${cards.length})`);
      ai=i;
      renderPreview();
      // Wait 2 rAF cycles for layout to settle
      await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
      const cnv=await captureCardDOM(cards[i]);
      if(!cnv)continue;
      rendered.push({idx:i,dataUrl:cnv.toDataURL('image/png')});
    }

    // ── Phase 2: Build ZIP ──
    setProgress('ZIP 파일 생성 중...');
    const zip=new JSZip();
    for(const{idx,dataUrl}of rendered){
      const b64=dataUrl.split(',')[1];
      zip.file(`card-${String(idx+1).padStart(2,'0')}.png`,b64,{base64:true});
    }
    const blob=await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:6}});
    const zipUrl=URL.createObjectURL(blob);
    const aEl=document.createElement('a');
    aEl.href=zipUrl;
    aEl.download=`kpop-cardnews-${Date.now()}.zip`;
    aEl.click();
    setTimeout(()=>URL.revokeObjectURL(zipUrl),5000);

    // ── Phase 3: Upload to Cloudinary & show URL list ──
    batchList.innerHTML='';
    const collectedUrls=[];
    for(const{idx,dataUrl}of rendered){
      const row=document.createElement('div');
      row.className='batch-url-item';
      row.innerHTML=`<span class="batch-url-num">${idx+1}</span><span class="batch-url-txt" style="color:var(--tt)">업로드 중...</span><button class="batch-url-copy" disabled style="opacity:.4">복사</button>`;
      batchList.appendChild(row);
      try{
        const url=await uploadToCloudinary(dataUrl);
        collectedUrls.push(url);
        const copyBtn=`<button class="batch-url-copy" onclick="copyBatchUrl(this,'${url.replace(/'/g,'%27')}')">복사</button>`;
        row.innerHTML=`<span class="batch-url-num">${idx+1}</span><span class="batch-url-txt" title="${url}">${url}</span>${copyBtn}`;
      }catch(e){
        row.innerHTML=`<span class="batch-url-num">${idx+1}</span><span class="batch-url-txt" style="color:#f87171">⚠️ ${e.message||'업로드 실패'}</span><button class="batch-url-copy" disabled style="opacity:.4">복사</button>`;
      }
    }
    if(collectedUrls.length>0){
      copyAllBtn.disabled=false;
      copyAllBtn.style.opacity='';
      copyAllBtn.dataset.urls=collectedUrls.join('\n');
    }
  }catch(e){
    setProgress(`<span style="color:#f87171">⚠️ ${e.message||'오류가 발생했습니다'}</span>`);
  }finally{
    ai=savedAi;
    renderAll();
    btn.disabled=false;
    btnPng.disabled=false;
  }
}

function clipboardCopy(text,onSuccess){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(onSuccess).catch(()=>{
      _clipboardFallback(text);onSuccess();
    });
  } else {
    _clipboardFallback(text);onSuccess();
  }
}
function _clipboardFallback(text){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';ta.style.top='-9999px';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');}catch(_){}
  document.body.removeChild(ta);
}
function copyBatchUrl(btn,url){
  const decoded=decodeURIComponent(url);
  clipboardCopy(decoded,()=>{
    const orig=btn.textContent;
    btn.textContent='복사됨 ✓';
    setTimeout(()=>btn.textContent=orig,1600);
  });
}

/* ══ RESIZER ══ */
(function(){
  const resizer=document.getElementById('resizer');
  const pr=document.getElementById('prPanel');
  let dragging=false,startX=0,startW=0;

  pr.style.width='720px';
  pr.style.flexShrink='0';

  function applyWidth(w){
    pr.style.width=Math.max(240,Math.min(900,w))+'px';
  }

  /* Only rescale the existing card element during drag — no DOM rebuild */
  function rescaleCard(){
    const card=document.querySelector('#pArea .cr');
    if(!card)return;
    const prW=pr.offsetWidth;
    const availW=prW-40;
    const availH=window.innerHeight-80;
    // read card's intrinsic size from its inline style
    const cw=parseFloat(card.style.width)||285;
    const ch=parseFloat(card.style.height)||400;
    const scale=Math.min(availW/cw,availH/ch,1.4);
    card.style.transform=`scale(${scale.toFixed(4)})`;
  }

  resizer.addEventListener('mousedown',e=>{
    e.preventDefault();
    dragging=true;
    startX=e.clientX;
    startW=pr.offsetWidth;
    resizer.classList.add('active');
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
  });

  window.addEventListener('mousemove',e=>{
    if(!dragging)return;
    // resizer is between .pm and .pr; dragging right → pr wider
    const delta=e.clientX-startX;
    applyWidth(startW-delta); // resizer follows mouse: drag right → pm wider, drag left → pr wider
    rescaleCard();
  });

  window.addEventListener('mouseup',()=>{
    if(!dragging)return;
    dragging=false;
    resizer.classList.remove('active');
    document.body.style.cursor='';
    document.body.style.userSelect='';
    updatePanelDims();
    _pvSig=null;_pvScale=0;
    renderPreview();
  });

  // touch
  resizer.addEventListener('touchstart',e=>{
    const t=e.touches[0];
    dragging=true;startX=t.clientX;startW=pr.offsetWidth;
    resizer.classList.add('active');
  },{passive:true});
  window.addEventListener('touchmove',e=>{
    if(!dragging)return;
    const t=e.touches[0];
    applyWidth(startW-(t.clientX-startX));
    rescaleCard();
  },{passive:true});
  window.addEventListener('touchend',()=>{
    if(!dragging)return;
    dragging=false;resizer.classList.remove('active');
    updatePanelDims();
    _pvSig=null;_pvScale=0;
    renderPreview();
  },{passive:true});
})();

var ptLastKey = '';
var ptTranslating = false;

function ptCardKey(c) {
  return c ? (c.tag||'') + '|' + (c.title||'') + '|' + (c.body||'') : '';
}

function ptShowEmpty(msg) {
  document.getElementById('ptBody').innerHTML =
    '<div class="pt-empty">' + (msg || '카드를 선택하면<br/>한국어 번역이 표시됩니다') + '</div>';
}

function ptShowLoading() {
  document.getElementById('ptBody').innerHTML =
    '<div class="pt-loading"><div class="pt-spin"></div><div class="pt-loading-t">번역 중...</div></div>';
}

function ptShowResult(data) {
  var html = '<div class="pt-badge">Claude AI 번역</div>';
  if (data.tag)   html += '<div class="pt-section"><div class="pt-label">태그</div><div class="pt-text">' + esc(data.tag)   + '</div></div><div class="pt-divider"></div>';
  if (data.title) html += '<div class="pt-section"><div class="pt-label">제목</div><div class="pt-text">' + esc(data.title) + '</div></div><div class="pt-divider"></div>';
  if (data.body)  html += '<div class="pt-section"><div class="pt-label">본문</div><div class="pt-text">' + esc(data.body)  + '</div></div>';
  document.getElementById('ptBody').innerHTML = html;
}

function ptUpdateCard() {
  if (ai < 0 || !cards[ai]) { ptShowEmpty(); return; }
  var c = cards[ai];
  var key = ptCardKey(c);
  if (key === ptLastKey) return;
  // 내용이 바뀌었으면 번역 초기화
  ptLastKey = '';
  var hasVi = /[àáâãèéêìíòóôõùúýăđơưạảấầẩẫậắằẳẵặẹẻẽếềểễệỉịọỏốồổỗộớờởỡợụủứừựửữ]/i.test((c.title||'')+(c.body||''));
  if (!c.title && !c.body) { ptShowEmpty('카드 내용을 입력하면<br/>번역 버튼이 활성화됩니다'); return; }
  if (!hasVi) {
    // 이미 한국어면 그대로 표시
    ptShowResult({ tag: c.tag, title: c.title, body: c.body });
    ptLastKey = key;
    return;
  }
  ptShowEmpty('번역 버튼을 눌러<br/>한국어로 번역하세요');
}

async function translateCard() {
  if (ptTranslating || ai < 0 || !cards[ai]) return;
  var c = cards[ai];
  if (!c.title && !c.body) return;
  var key = ptCardKey(c);

  ptTranslating = true;
  document.getElementById('ptBtn').disabled = true;
  ptShowLoading();

  try {
    var parts = [];
    if (c.tag)   parts.push('태그: ' + c.tag);
    if (c.title) parts.push('제목: ' + c.title);
    if (c.body)  parts.push('본문: ' + c.body);

    var prompt = '다음 텍스트를 자연스러운 한국어로 번역해줘. JSON만 반환 (코드블록 없이):\n' +
      '{"tag":"","title":"","body":""}\n\n입력:\n' + parts.join('\n');

    var res = await fetch('/api/claude', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ prompt: prompt })
    });
    var data = await res.json();
    var raw = (data.text || '').replace(/```json|```/g, '').trim();
    var parsed = JSON.parse(raw);
    ptShowResult(parsed);
    ptLastKey = key;
  } catch(e) {
    ptShowEmpty('번역 실패: ' + e.message);
  }

  ptTranslating = false;
  document.getElementById('ptBtn').disabled = false;
}
